name: Bug Report / 缺陷反馈
description: Report a reproducible bug in SealedChat / 提交可复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        感谢你反馈问题。

  - type: textarea
    id: summary
    attributes:
      label: Bug Summary / 问题概述
      description: Describe the issue clearly and concisely. / 请简要描述问题。
      placeholder: What went wrong? / 出现了什么问题？
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce / 复现步骤
      description: If possible, list the shortest steps to reproduce it. / 如方便，请提供最小复现步骤。
      placeholder: |
        1. Open SealedChat / 打开 SealedChat
        2. Create a room / 创建房间
        3. See error / 出现 ...

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望行为
      description: What did you expect to happen? / 你期望发生什么？

  - type: input
    id: browser
    attributes:
      label: Browser / 浏览器
      placeholder: e.g. Chrome 126, Firefox 128

  - type: input
    id: os
    attributes:
      label: Operating System / 操作系统
      placeholder: e.g. Windows 11, macOS 14, Ubuntu 24.04

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist / 提交前确认
      options:
        - label: I have searched existing issues before submitting this report. / 我已先搜索过现有 Issue。
        - label: I have removed sensitive information from logs and screenshots. / 我已移除日志和截图中的敏感信息。
